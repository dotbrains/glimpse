<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>glimpse</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header id="header">
    <div class="header-left">
      <h1>glimpse</h1>
      <span id="repo-name" class="badge"></span>
      <span id="ref-info" class="badge ref"></span>
    </div>
    <div class="header-right">
      <span id="summary" class="summary"></span>
      <button id="view-toggle" class="toggle-btn" title="Toggle split/unified">unified</button>
      <button id="theme-toggle" class="toggle-btn" title="Toggle dark/light">☀️</button>
      <span id="pr-buttons"></span>
    </div>
  </header>
  <nav id="file-list"></nav>
  <div id="toolbar" class="copy-all-bar" style="display:none"></div>
  <main id="diff-container"></main>
  <script src="/app.js"></script>
</body>
</html>
