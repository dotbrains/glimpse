<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0d1117"/>
  <rect x="1" y="1" width="30" height="30" rx="6" stroke="#30363d" stroke-width="0.75" fill="none"/>

  <!-- Divider line (split pane) -->
  <line x1="16" y1="6" x2="16" y2="26" stroke="#30363d" stroke-width="0.75"/>

  <!-- Left pane: old lines (dimmer blue) -->
  <rect x="5" y="8" width="8" height="2" rx="1" fill="#388bfd25"/>
  <rect x="5" y="8" width="8" height="2" rx="1" stroke="#388bfd" stroke-width="0.5" fill="none"/>
  <rect x="5" y="12" width="6" height="2" rx="1" fill="#388bfd25"/>
  <rect x="5" y="12" width="6" height="2" rx="1" stroke="#388bfd" stroke-width="0.5" fill="none"/>
  <!-- Context lines -->
  <rect x="5" y="16" width="7" height="2" rx="1" fill="#8b949e22"/>
  <rect x="5" y="20" width="5" height="2" rx="1" fill="#8b949e22"/>

  <!-- Right pane: new lines (brighter blue) -->
  <rect x="19" y="8" width="8" height="2" rx="1" fill="#58a6ff30"/>
  <rect x="19" y="8" width="8" height="2" rx="1" stroke="#58a6ff" stroke-width="0.5" fill="none"/>
  <rect x="19" y="12" width="7" height="2" rx="1" fill="#58a6ff30"/>
  <rect x="19" y="12" width="7" height="2" rx="1" stroke="#58a6ff" stroke-width="0.5" fill="none"/>
  <rect x="19" y="16" width="6" height="2" rx="1" fill="#79c0ff30"/>
  <rect x="19" y="16" width="6" height="2" rx="1" stroke="#79c0ff" stroke-width="0.5" fill="none"/>
  <!-- Context line -->
  <rect x="19" y="20" width="5" height="2" rx="1" fill="#8b949e22"/>

  <!-- Accent bar at top -->
  <rect x="4" y="4" width="24" height="1.5" rx="0.75" fill="url(#bar)" opacity="0.5"/>
  <defs>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#388bfd"/>
      <stop offset="0.5" stop-color="#58a6ff"/>
      <stop offset="1" stop-color="#79c0ff"/>
    </linearGradient>
  </defs>
</svg>
