<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0d1117"/>
  <rect x="1" y="1" width="30" height="30" rx="6" stroke="#30363d" stroke-width="0.75" fill="none"/>

  <!-- Divider line (split pane) -->
  <line x1="16" y1="6" x2="16" y2="26" stroke="#30363d" stroke-width="0.75"/>

  <!-- Left pane: removed lines -->
  <rect x="5" y="8" width="8" height="2" rx="1" fill="#f8514933"/>
  <rect x="5" y="8" width="8" height="2" rx="1" stroke="#f85149" stroke-width="0.5" fill="none"/>
  <rect x="5" y="12" width="6" height="2" rx="1" fill="#f8514933"/>
  <rect x="5" y="12" width="6" height="2" rx="1" stroke="#f85149" stroke-width="0.5" fill="none"/>
  <!-- Context line -->
  <rect x="5" y="16" width="7" height="2" rx="1" fill="#8b949e22"/>
  <rect x="5" y="20" width="5" height="2" rx="1" fill="#8b949e22"/>

  <!-- Right pane: added lines -->
  <rect x="19" y="8" width="8" height="2" rx="1" fill="#3fb95033"/>
  <rect x="19" y="8" width="8" height="2" rx="1" stroke="#3fb950" stroke-width="0.5" fill="none"/>
  <rect x="19" y="12" width="7" height="2" rx="1" fill="#3fb95033"/>
  <rect x="19" y="12" width="7" height="2" rx="1" stroke="#3fb950" stroke-width="0.5" fill="none"/>
  <rect x="19" y="16" width="6" height="2" rx="1" fill="#3fb95033"/>
  <rect x="19" y="16" width="6" height="2" rx="1" stroke="#3fb950" stroke-width="0.5" fill="none"/>
  <!-- Context line -->
  <rect x="19" y="20" width="5" height="2" rx="1" fill="#8b949e22"/>

  <!-- Accent glow at top -->
  <rect x="1" y="1" width="30" height="6" rx="6" fill="url(#glow)" opacity="0.3"/>
  <defs>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f85149"/>
      <stop offset="0.5" stop-color="#58a6ff"/>
      <stop offset="1" stop-color="#3fb950"/>
    </linearGradient>
  </defs>
</svg>
